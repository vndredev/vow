name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      # Vite+ provides the toolchain (vp); install it globally before pnpm install
      # so the `prepare` script (vp config) can run.
      - run: npm install -g vite-plus
      - run: pnpm install --frozen-lockfile
      # The squash-merge subject IS the PR title — the source the roadmap timeline reads. Enforce the
      # same commit format on it (commitlint), so the timeline's input is guaranteed, not just commits.
      - name: Lint PR title
        if: github.event_name == 'pull_request'
        run: echo "$PR_TITLE" | pnpm exec commitlint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
      # Generate first: the apps import from the gitignored .generated/, which only a Vite run
      # materializes — so `vp check` (typecheck) needs it to exist beforehand.
      - run: vp build apps/starter
      - run: vp build apps/studio
      # `vp lint` is the deterministic wall (whole-repo, type-aware oxlint). Unlike `vp check`'s tsgo
      # typecheck — which can crash to EMPTY output and still exit 0 (a silent green) — it fails loudly.
      - name: Lint — the wall
        run: vp lint
      # `vp check` adds format + the full typecheck, but can silent-green (a tsgo crash exits 0, empty).
      # GUARD it: require its pass markers as proof both steps ran — their absence is a failure, not a pass.
      - name: Format + typecheck (guarded against silent-green)
        run: |
          set -o pipefail
          vp check 2>&1 | tee /tmp/vp-check.log
          grep -q 'correctly formatted' /tmp/vp-check.log \
            && grep -q 'no warnings, lint errors, or type errors' /tmp/vp-check.log \
            || { echo '::error::vp check produced no pass markers — a step (likely tsgo) crashed to empty output (silent green)'; exit 1; }
      - run: pnpm -r test
      - run: vp build apps/docs
      # Dev-app smoke test: lint + test + build can ALL be green while the dev app breaks at runtime —
      # a node: builtin leaking into the browser bundle (the build tree-shakes it away, tests run in
      # Node). Boots `vp dev` and crawls the client module graph; fails if any node: builtin reached it.
      - name: Smoke test (studio dev)
        run: pnpm smoke
