name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      # Vite+ provides the toolchain (vp); install it globally before pnpm install
      # so the `prepare` script (vp config) can run.
      - run: npm install -g vite-plus
      - run: pnpm install --frozen-lockfile
      # Generate first: the showcase imports from the gitignored .generated/, which only a
      # Vite run materializes — so `vp check` (typecheck) needs it to exist beforehand.
      - run: vp build apps/showcase
      - run: vp check
      - run: pnpm -r test
      - run: pnpm --filter @vow/docs run docs:build
