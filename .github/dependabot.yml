version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Let releases age past Vite+'s minimum-release-age supply-chain policy before
    # proposing them, so dependency PRs don't fail the lockfile age check.
    cooldown:
      default-days: 7
    groups:
      voidzero:
        patterns:
          - "vite-plus"
          - "@voidzero-dev/*"
          - "@typescript/native-preview"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
