packages:
  - apps/*
  - packages/*
  - tools/*
  - docs

catalogMode: prefer

catalog:
  "@types/node": ^24.13.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  "@typescript/native-preview": 7.0.0-dev.20260509.2
  "@vitejs/plugin-vue": ^6.0.7
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  # VitePress (the docs tool) is built for upstream Vite — it uses transformWithEsbuild, which Vite+
  # dropped for oxc. Keep VitePress on its own real Vite; the vow packages stay on Vite+.
  "vitepress>vite": "^6.0.0"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: true
